name: Fetch Are.na Images

on:
  schedule:
    # Every Tuesday at 3:00 AM UTC
    - cron: '0 3 * * 2'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch images from Are.na API v3
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const https = require('https');

          const CHANNEL_SLUG = 'feed-2pl7kppxxkq';
          const PER_PAGE = 100;
          const SORT = 'created_at_desc';

          function get(url) {
            return new Promise((resolve, reject) => {
              const options = {
                headers: { 'User-Agent': 'dontfeellikeposting-build/1.0' }
              };
              https.get(url, options, (res) => {
                let body = '';
                res.on('data', chunk => body += chunk);
                res.on('end', () => {
                  if (res.statusCode !== 200) {
                    reject(new Error(`HTTP ${res.statusCode} for ${url}`));
                  } else {
                    resolve(JSON.parse(body));
                  }
                });
              }).on('error', reject);
            });
          }

          async function fetchAllImages() {
            const images = [];
            let page = 1;
            let hasMore = true;

            while (hasMore) {
              const url = `https://api.are.na/v3/channels/${CHANNEL_SLUG}/contents?per=${PER_PAGE}&sort=${SORT}&page=${page}`;
              console.log(`Fetching page ${page}: ${url}`);
              const data = await get(url);

              const pageImages = data.data.filter(block => block.type === 'Image' && block.image);
              for (const block of pageImages) {
                images.push({
                  id: block.id,
                  title: block.title || '',
                  url: block.image.large.src,
                  url_2x: block.image.large.src_2x
                });
              }

              console.log(`  Page ${page}: ${pageImages.length} images (${images.length} total so far)`);
              hasMore = data.meta.has_more_pages;
              page++;

              // Be polite to the API between paginated requests
              if (hasMore) await new Promise(r => setTimeout(r, 300));
            }

            return images;
          }

          fetchAllImages().then(images => {
            fs.mkdirSync('data', { recursive: true });
            fs.writeFileSync('data/images.json', JSON.stringify(images, null, 2));
            console.log(`Done. Wrote ${images.length} images to data/images.json`);
          }).catch(err => {
            console.error('Failed to fetch images:', err.message);
            process.exit(1);
          });
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/images.json
          if git diff --cached --quiet; then
            echo "No changes to data/images.json — skipping commit."
          else
            git commit -m "chore: update images from Are.na [skip ci]"
            git push
          fi
